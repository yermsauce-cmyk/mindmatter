<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Matter</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wrapper {
            position: relative;
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background-image: url('assets/asset2background.jpg');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.9) inset;
        }

        #vex-layer {
            position: absolute;
            width: 45%;
            z-index: 10;
            pointer-events: none;
            transform: translate(-50%, -50%);
            will-change: transform;
            left: 28%;
            top: 50%;
        }

        #vex-image {
            width: 100%;
            height: auto;
            pointer-events: auto;
            cursor: pointer;
            filter: drop-shadow(0 0 15px rgba(162, 0, 255, 0.4));
            animation: levitate 4s ease-in-out infinite alternate;
            transition: filter 0.2s ease, transform 0.1s ease;
        }

        @keyframes levitate {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
            100% { transform: translateY(5px) rotate(-1deg); }
        }

        .hitbox {
            position: absolute;
            cursor: pointer;
            background: rgba(255, 0, 0, 0.0);
            transition: background 0.3s ease;
        }

        .hitbox:hover {
            background: rgba(255, 0, 60, 0.08);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.2);
        }

        .link-cave  { top: 24%; left: 60%; width: 20%; height: 12%; }
        .link-stash { top: 39%; left: 60%; width: 20%; height: 12%; }
        .link-lore  { top: 54%; left: 60%; width: 20%; height: 12%; }
        .link-gang  { top: 69%; left: 60%; width: 20%; height: 12%; }

        .merch-feed-zone {
            position: absolute;
            right: 0;
            top: 0;
            width: 11.5%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding-top: 7%;
            gap: 3.5%;
            align-items: center;
        }

        .merch-box {
            width: 83%;
            height: 18.5%;
            background: rgba(162, 0, 255, 0.0);
            cursor: pointer;
            transition: background 0.3s;
        }
        .merch-box:hover {
            background: rgba(162, 0, 255, 0.15);
            outline: 1px solid #a200ff;
        }

        /* =============================================
           LEVEL BAR — uses levelbar.png as the frame
           ============================================= */
        #level-bar-container {
            position: absolute;
            top: 5%;
            left: 2%;
            width: 30%;
            z-index: 50;
            pointer-events: none;
            user-select: none;
        }

        #level-bar-bg {
            width: 100%;
            display: block;
            image-rendering: auto;
        }

        #level-bar-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        #unlock-label {
            position: absolute;
            top: 5%;
            left: 22%;
            width: 57%;
            text-align: center;
            font-family: 'Arial Narrow', Arial, sans-serif;
            font-size: 1.05em;
            font-weight: bold;
            color: #e8c8a0;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-shadow: 0 0 6px rgba(180, 80, 20, 0.8);
            pointer-events: none;
        }

        #progress-track {
            position: absolute;
            top: 19%;
            left: 14%;
            width: 73%;
            height: 5%;
            background: rgba(60, 0, 0, 0.6);
            border-radius: 3px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #8b0000, #cc0000, #ff2200);
            border-radius: 3px;
            transition: width 0.4s ease;
            box-shadow: 0 0 8px rgba(200, 0, 0, 0.7);
        }

        #loot-count {
            position: absolute;
            top: 50%;
            left: 27%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
        }

        #loot-number {
            display: block;
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 2.4em;
            font-weight: 900;
            color: #cc1111;
            text-shadow: 0 0 10px rgba(200, 0, 0, 0.6);
            line-height: 1;
        }

        #loot-label {
            display: block;
            font-family: Arial, sans-serif;
            font-size: 0.72em;
            color: #bbb;
            margin-top: 2px;
            line-height: 1.2;
            text-align: center;
        }

        #parchment-text {
            position: absolute;
            top: 42%;
            left: 57%;
            width: 37%;
            text-align: center;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 0.78em;
            color: #3a2a1a;
            line-height: 1.35;
            pointer-events: none;
        }

        @keyframes lvlUpAnim {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            80%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -60%) scale(0.8); }
        }

        @keyframes particleBurst {
            0%   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0); }
        }

        .click-particle {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #a200ff;
            pointer-events: none;
            z-index: 9999;
            animation: particleBurst 0.6s ease-out forwards;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <div id="vex-layer">
            <img id="vex-image" src="assets/image_2.png" alt="Vex">
        </div>

        <a href="#gallery" class="hitbox link-cave" title="The Cave Gallery"></a>
        <a href="#shop" class="hitbox link-stash" title="The Stash Shop"></a>
        <a href="#about" class="hitbox link-lore" title="The Lore About"></a>
        <a href="#socials" class="hitbox link-gang" title="The Gang Socials"></a>

        <div class="merch-feed-zone">
            <div class="merch-box" onclick="location.href='#tshirts'" title="Rat T-Shirts"></div>
            <div class="merch-box" onclick="location.href='#patches'" title="Gothic Patches"></div>
            <div class="merch-box" onclick="location.href='#bats'" title="Punk Bat Prints"></div>
            <div class="merch-box" onclick="location.href='#secret'" title="Mystery Item"></div>
        </div>

    </div>

    <!-- LEVEL BAR (uses levelbar.png as the frame) -->
    <div id="level-bar-container">
        <img id="level-bar-bg" src="assets/levelbar.png" alt="Level Bar">
        <div id="level-bar-overlay">
            <div id="unlock-label">NEXT UNLOCK: <span id="unlock-name">VEX'S TATTOO</span></div>
            <div id="progress-track">
                <div id="progress-fill"></div>
            </div>
            <div id="loot-count">
                <span id="loot-number">0</span>
                <span id="loot-label">accessories<br>unlocked</span>
            </div>
            <div id="parchment-text">Click to evolve<br>Vex's gear.<br>Find secrets.</div>
        </div>
    </div>

    <script>
        /* ── VEX FLUID TRACKING ── */
        const vexLayer = document.getElementById('vex-layer');
        const vexImage = document.getElementById('vex-image');

        let mouseX = window.innerWidth / 4;
        let mouseY = window.innerHeight / 2;
        let currentX = window.innerWidth / 4;
        let currentY = window.innerHeight / 2;
        let velocityX = 0;
        let velocityY = 0;
        let rotation = 0;
        let rotationVelocity = 0;
        let time = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function fluidTracking() {
            time += 0.016;

            const dx = mouseX - currentX;
            const dy = mouseY - currentY;

            const springStrength = 0.03;
            const damping = 0.85;
            velocityX += dx * springStrength;
            velocityY += dy * springStrength;
            velocityX *= damping;
            velocityY *= damping;

            currentX += velocityX;
            currentY += velocityY;

            const floatX  = Math.sin(time * 1.5) * 15;
            const floatY  = Math.cos(time * 1.2) * 20;
            const breathe = 1 + Math.sin(time * 2) * 0.03;

            rotationVelocity += (velocityX * 0.15 - rotation * 0.1) * 0.02;
            rotationVelocity *= 0.92;
            rotation += rotationVelocity;

            const wobble = Math.sin(time * 3) * 3;

            vexLayer.style.left      = `${currentX + floatX}px`;
            vexLayer.style.top       = `${currentY + floatY}px`;
            vexLayer.style.transform = `translate(-50%, -50%) scale(${breathe}) rotate(${rotation + wobble}deg)`;

            const speed        = Math.sqrt(velocityX * velocityX + velocityY * velocityY);
            const glowIntensity = Math.min(20 + speed * 2, 50);
            const hue          = 280 + Math.sin(time) * 20;
            vexImage.style.filter = `drop-shadow(0 0 ${glowIntensity}px hsla(${hue}, 100%, 50%, 0.6)) brightness(${1 + speed * 0.01})`;

            requestAnimationFrame(fluidTracking);
        }
        fluidTracking();

        /* ── LEVEL / CLICK SYSTEM ── */
        const CLICKS_PER_LEVEL = 10;

        const UNLOCKS = [
            "VEX'S TATTOO",
            "SPIKED COLLAR",
            "SECOND WING",
            "GLOWING EYES",
            "CHAIN ANKLET",
            "TORN VEST",
            "HEART TAIL",
            "BLOOD PATCH",
            "PUNK BOOTS",
            "DARK HALO"
        ];

        let vexLevel      = parseInt(localStorage.getItem('vexLevel'))  || 1;
        let vexClickCount = parseInt(localStorage.getItem('vexClicks')) || 0;
        let lootUnlocked  = parseInt(localStorage.getItem('vexLoot'))   || 0;

        const progressFill  = document.getElementById('progress-fill');
        const lootNumber    = document.getElementById('loot-number');
        const unlockName    = document.getElementById('unlock-name');
        const parchmentText = document.getElementById('parchment-text');

        function getUnlockName(level) {
            return UNLOCKS[(level - 1) % UNLOCKS.length];
        }

        function updateUI() {
            const pct = (vexClickCount / CLICKS_PER_LEVEL) * 100;
            progressFill.style.width = `${pct}%`;
            lootNumber.textContent   = lootUnlocked;
            unlockName.textContent   = getUnlockName(vexLevel);
        }

        updateUI();

        function showLevelUp(level) {
            const lvlUp = document.createElement('div');
            lvlUp.style.cssText = `
                position: fixed;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                color: #ff00ff;
                font-size: 4rem;
                font-weight: bold;
                z-index: 10000;
                text-shadow: 0 0 30px #ff00ff, 0 0 60px #ff0088, 0 0 90px #ff0044;
                pointer-events: none;
                animation: lvlUpAnim 1.5s ease-out forwards;
                font-family: 'Arial Black', Arial, sans-serif;
                letter-spacing: 3px;
            `;
            lvlUp.textContent = `LEVEL ${level}!`;
            document.body.appendChild(lvlUp);
            setTimeout(() => lvlUp.remove(), 1500);
        }

        function spawnParticles(x, y) {
            const colors = ['#a200ff', '#ff00ff', '#ff0044', '#ff6600'];
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'click-particle';
                const angle = (i / 8) * Math.PI * 2;
                const dist  = 40 + Math.random() * 40;
                p.style.left = `${x}px`;
                p.style.top  = `${y}px`;
                p.style.setProperty('--tx', `${Math.cos(angle) * dist}px`);
                p.style.setProperty('--ty', `${Math.sin(angle) * dist}px`);
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = `${0.4 + Math.random() * 0.3}s`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }

        vexImage.addEventListener('click', (e) => {
            e.stopPropagation();

            vexImage.style.filter    = 'drop-shadow(0 0 35px #a200ff) hue-rotate(45deg) brightness(1.3)';
            vexImage.style.transform = 'scale(1.1) rotate(-8deg)';
            setTimeout(() => {
                vexImage.style.filter    = 'drop-shadow(0 0 15px rgba(162,0,255,0.4))';
                vexImage.style.transform = 'scale(1) rotate(0deg)';
            }, 250);

            spawnParticles(e.clientX, e.clientY);

            vexClickCount++;

            if (vexClickCount >= CLICKS_PER_LEVEL) {
                vexLevel++;
                vexClickCount = 0;
                lootUnlocked++;

                localStorage.setItem('vexLevel',  vexLevel);
                localStorage.setItem('vexClicks', vexClickCount);
                localStorage.setItem('vexLoot',   lootUnlocked);

                updateUI();
                showLevelUp(vexLevel);

                const baseSize = 42;
                const newSize  = Math.min(baseSize + (vexLevel - 1) * 3, 70);
                vexLayer.style.width = `${newSize}%`;
            } else {
                localStorage.setItem('vexClicks', vexClickCount);
                updateUI();
            }
        });
    </script>
</body>
</html>
