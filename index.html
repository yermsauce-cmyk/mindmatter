<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIND MATTER</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        .wrapper { position: relative; width: 100vw; height: 100vh; background-image: url('assets/background.jpg'); background-size: cover; background-position: center; }
        #vex-layer { position: absolute; width: 42%; z-index: 10; left: 26%; top: 48%; transform: translate(-50%, -50%); }
        #vex-image { width: 100%; height: auto; pointer-events: auto; cursor: pointer; filter: drop-shadow(0 0 20px rgba(162, 0, 255, 0.6)); animation: levitate 4.2s ease-in-out infinite alternate; }
        @keyframes levitate { 0% { transform: translateY(0px) rotate(-2deg); } 100% { transform: translateY(-22px) rotate(2deg); } }
        .menu { position: absolute; top: 28%; left: 58%; z-index: 20; pointer-events: auto; }
        .menu a { display: block; color: #fff; font-size: 2.45rem; font-weight: bold; text-decoration: none; margin: 18px 0; text-shadow: 0 0 10px #ff0044, 0 0 20px #ff0088, 0 0 40px #ff00ff; transition: all 0.3s ease; pointer-events: auto; }
        .menu a:hover { color: #ff00ff; text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff0088, 0 0 60px #ff0044; transform: translateX(25px) scale(1.05); filter: brightness(1.3); }
        .merch-feed-zone { position: absolute; right: 4%; top: 12%; width: 13%; z-index: 20; pointer-events: auto; }
        .merch-box { width: 100%; height: 18%; margin-bottom: 12px; background: rgba(0,0,0,0.6); border: 2px solid #440000; cursor: pointer; transition: all 0.3s; }
        .merch-box:hover { border-color: #ff00ff; background: rgba(255,0,80,0.15); box-shadow: 0 0 25px #ff00ff; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div id="vex-layer">
            <img id="vex-image" src="assets/vex.png" alt="Vex">
        </div>
        <div class="menu">
            <a href="#gallery">THE CAVE <span style="font-size:1rem;opacity:0.85;">Gallery</span></a>
            <a href="#shop">THE STASH <span style="font-size:1rem;opacity:0.85;">Shop</span></a>
            <a href="#lore">THE LORE <span style="font-size:1rem;opacity:0.85;">About</span></a>
            <a href="#socials">THE GANG <span style="font-size:1rem;opacity:0.85;">Socials</span></a>
        </div>
        <div class="merch-feed-zone">
            <div class="merch-box" onclick="alert('Gothic-Punk Rat T-Shirts')">Gothic-Punk Rat T-Shirts</div>
            <div class="merch-box" onclick="alert('Gothic Patches Prints')">Gothic Patches Prints</div>
            <div class="merch-box" onclick="alert('Gothic-Punk-Bats Prints')">Gothic-Punk-Bats Prints</div>
        </div>
    </div>
    <script>
        const vexImage = document.getElementById('vex-image');
        vexImage.addEventListener('click', () => {
            vexImage.style.filter = 'drop-shadow(0 0 50px #ff00ff) brightness(1.6)';
            setTimeout(() => { vexImage.style.filter = 'drop-shadow(0 0 20px rgba(162, 0, 255, 0.6))'; }, 300);
        });
    </script>
</body>
</html>
