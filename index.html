<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIND MATTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Creepster&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-red: #ff003c;
            --neon-purple: #a200ff;
            --dark-bg: #111;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--dark-bg);
            background-image: url('assets/background.jpg');
            background-size: cover;
            background-position: center;
            font-family: 'Permanent Marker', cursive;
            color: #fff;
        }

        #vex-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 300px;
            pointer-events: none;
            z-index: 100;
        }

        #vex {
            width: 100%;
            height: auto;
            pointer-events: auto;
            cursor: pointer;
            filter: drop-shadow(0 0 15px rgba(162, 0, 255, 0.6));
            animation: hover 3s ease-in-out infinite alternate;
            transition: transform 0.1s ease-out, filter 0.2s ease;
        }

        @keyframes hover {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-20px); }
        }

        .nav-container {
            position: absolute;
            top: 30%;
            right: 25%;
            display: flex;
            flex-direction: column;
            gap: 30px;
            text-align: center;
            z-index: 10;
        }

        .nav-link {
            text-decoration: none;
            color: #ddd;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-shadow: 2px 2px 4px #000;
        }

        .nav-link span {
            display: block;
            font-size: 1rem;
            color: #888;
            font-family: sans-serif;
            letter-spacing: 4px;
        }

        .nav-link:hover {
            color: #fff;
            text-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-red);
            transform: scale(1.05) translateX(-10px);
        }

        .merch-feed {
            position: absolute;
            top: 0;
            right: 0;
            width: 20%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            border-left: 2px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            overflow-y: auto;
            z-index: 10;
        }

        .merch-header {
            font-family: sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #aaa;
        }

        .merch-item {
            width: 80%;
            aspect-ratio: 1 / 1;
            background-color: #222;
            border: 2px solid #555;
            margin-bottom: 20px;
            cursor: pointer;
            transition: border-color 0.3s, transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
            color: #fff;
            font-size: 1.2rem;
        }

        .merch-item:hover {
            border-color: var(--neon-red);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.5);
        }
    </style>
</head>
<body>

    <div id="vex-container">
        <img id="vex" src="assets/vex.png" alt="Vex">
    </div>

    <nav class="nav-container">
        <a href="#cave" class="nav-link" style="color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red);">
            The Cave <span>Gallery</span>
        </a>
        <a href="#stash" class="nav-link">
            The Stash <span>Shop</span>
        </a>
        <a href="#lore" class="nav-link">
            The Lore <span>About</span>
        </a>
        <a href="#gang" class="nav-link">
            The Gang <span>Socials</span>
        </a>
    </nav>

    <aside class="merch-feed">
        <div class="merch-header">MERCHANDISING FEED</div>
        <div class="merch-item">Gothic-Punk Rat T-Shirts</div>
        <div class="merch-item">Gothic Patches Prints</div>
        <div class="merch-item">Gothic-Punk-Bats Prints</div>
    </aside>

    <script>
        const vexContainer = document.getElementById('vex-container');
        const vex = document.getElementById('vex');
        
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let vexX = window.innerWidth / 4;
        let vexY = window.innerHeight / 2;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateVex() {
            vexX += (mouseX - vexX - 150) * 0.03;
            vexY += (mouseY - vexY - 150) * 0.03;
            vexContainer.style.transform = `translate(${vexX}px, ${vexY}px)`;
            requestAnimationFrame(animateVex);
        }
        
        animateVex();

        vex.addEventListener('click', () => {
            vex.style.filter = 'drop-shadow(0 0 40px #ff003c) drop-shadow(0 0 60px #a200ff)';
            vex.style.transform = 'scale(1.15) rotate(-5deg)';
            
            setTimeout(() => {
                vex.style.filter = 'drop-shadow(0 0 15px rgba(162, 0, 255, 0.6))';
                vex.style.transform = 'scale(1) rotate(0deg)';
            }, 300);
            
            console.log("Vex reacts to the interaction.");
        });
    </script>
</body>
</html>
