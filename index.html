<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YERM • THE CAVE</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;800&family=Bangers&family=Creepster&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Static Background -->
  <div class="background"></div>

  <!-- Interactive Rat Canvas (only thing that moves) -->
  <canvas id="rat-canvas"></canvas>

  <!-- Overlay UI -->
  <div class="overlay">
    <!-- Top Neon Sign -->
    <div class="mind-matter">MIND MATTER</div>

    <!-- Central Menu -->
    <div class="central-menu">
      <a href="#" class="menu-item" data-action="gallery">THE CAVE<br><span>Gallery</span></a>
      <a href="#" class="menu-item" data-action="shop">THE STASH<br><span>Shop</span></a>
      <a href="#" class="menu-item" data-action="lore">THE LORE<br><span>About</span></a>
      <a href="#" class="menu-item" data-action="socials">THE GANG<br><span>Socials</span></a>
    </div>

    <!-- Right Side Merch Feed -->
    <div class="merch-feed">
      <h3>MERCHANDISING FEED</h3>
      <div class="merch-item">Gothic-Punk Rat T-Shirts</div>
      <div class="merch-item">Gothic Patches Prints</div>
      <div class="merch-item">Gothic-Punk-Bats Prints</div>
    </div>

    <!-- Bottom Info -->
    <div class="bottom-info">
      <div class="loot">
        LOOT <span id="loot-count">14</span>
      </div>
      <div class="unlock">
        NEXT UNLOCK: VEX'S TATTOO
      </div>
    </div>
  </div>

  <div id="cursor-dot" aria-hidden="true"></div>
  <script src="script.js"></script>
</body>
</html>
