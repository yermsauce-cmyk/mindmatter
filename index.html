<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIND MATTER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      overflow: hidden;
      background: #0a0a0a;
      font-family: system-ui, sans-serif;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: url('assets/background.jpg') center/cover no-repeat;
      z-index: 1;
    }

    #rat-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: auto;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 3;
      pointer-events: none;
    }

    .neon-sign {
      position: absolute;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3.8rem;
      color: #ff0044;
      text-shadow: 0 0 30px #ff00ff, 0 0 60px #ff0088;
      font-weight: bold;
      letter-spacing: 4px;
      pointer-events: none;
    }

    .menu {
      position: absolute;
      top: 32%;
      left: 52%;
      transform: translateX(-50%);
      text-align: left;
      pointer-events: auto;
    }

    .menu a {
      display: block;
      color: white;
      font-size: 2.35rem;
      font-weight: bold;
      text-decoration: none;
      margin: 18px 0;
      text-shadow: 3px 3px 12px #000;
      transition: all 0.3s;
    }

    .menu a:hover {
      color: #ff00ff;
      transform: translateX(30px);
    }

    .merch-feed {
      position: absolute;
      top: 12%;
      right: 4%;
      width: 240px;
      pointer-events: auto;
    }

    .feed-title {
      color: #ff00ff;
      font-size: 1.4rem;
      text-align: center;
      margin-bottom: 15px;
    }

    .merch-item {
      background: rgba(0,0,0,0.8);
      border: 1px solid #660000;
      padding: 14px 12px;
      margin: 10px 0;
      color: #ddd;
      cursor: pointer;
      transition: all 0.3s;
    }

    .merch-item:hover {
      background: rgba(255, 0, 60, 0.25);
      border-color: #ff00ff;
    }
  </style>
</head>
<body>
  <div class="scene">
    <canvas id="rat-canvas"></canvas>
  </div>

  <div class="overlay">
    <div class="neon-sign">MIND MATTER</div>

    <div class="menu">
      <a href="#">THE CAVE <span style="font-size:1.1rem;opacity:0.8;">Gallery</span></a>
      <a href="#">THE STASH <span style="font-size:1.1rem;opacity:0.8;">Shop</span></a>
      <a href="#">THE LORE <span style="font-size:1.1rem;opacity:0.8;">About</span></a>
      <a href="#">THE GANG <span style="font-size:1.1rem;opacity:0.8;">Socials</span></a>
    </div>

    <div class="merch-feed">
      <div class="feed-title">MERCHANDISING FEED</div>
      <div class="merch-item">Gothic-Punk Rat T-Shirts</div>
      <div class="merch-item">Gothic Patches Prints</div>
      <div class="merch-item">Gothic-Punk-Bats Prints</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('rat-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const rat = {
      img: new Image(),
      baseX: 0.24,
      baseY: 0.48,
      size: 520
    };

    rat.img.src = 'assets/vex.png';

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const float = Math.sin(Date.now() / 400) * 18;
      const x = canvas.width * rat.baseX;
      const y = canvas.height * rat.baseY + float;
      ctx.drawImage(rat.img, x, y, rat.size, rat.size);
      requestAnimationFrame(animate);
    }

    canvas.addEventListener('click', (e) => {
      const ratCenterX = canvas.width * rat.baseX + rat.size / 2;
      const ratCenterY = canvas.height * rat.baseY + rat.size / 2;
      if (Math.hypot(e.clientX - ratCenterX, e.clientY - ratCenterY) < rat.size * 0.7) {
        canvas.style.filter = 'brightness(3) saturate(2.8)';
        setTimeout(() => canvas.style.filter = '', 280);
      }
    });

    rat.img.onload = animate;
  </script>
</body>
</html>
