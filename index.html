<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Matter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }

        .scene {
            position: relative;
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            margin: auto;
            background: url('assets/asset2background.jpg') center/cover no-repeat;
        }

        /* VEX — center */
        #vex {
            position: absolute;
            left: 28%; top: 50%;
            width: 45%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            filter: drop-shadow(0 0 20px rgba(162,0,255,0.5));
            animation: float 4s ease-in-out infinite alternate;
        }
        @keyframes float {
            0%   { transform: translate(-50%,-50%) translateY(0); }
            100% { transform: translate(-50%,-50%) translateY(-20px); }
        }

        /* NAV — right side plain text */
        .nav {
            position: absolute;
            right: 6%;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1rem;
            font-weight: bold;
            color: #ccc;
            text-decoration: none;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .nav:hover { color: #ff0022; }
        .nav-cave  { top: 25%; }
        .nav-stash { top: 40%; }
        .nav-lore  { top: 55%; }
        .nav-gang  { top: 70%; }

        /* MERCH — far right */
        .merch {
            position: absolute;
            right: 2%;
            width: 7%;
            height: 15%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .merch:hover { border-color: #ff0022; }
        .merch img { width: 100%; height: 100%; object-fit: cover; }
        .merch-1 { top: 23%; }
        .merch-2 { top: 41%; }
        .merch-3 { top: 59%; }
        .merch-4 { top: 77%; }
    </style>
</head>
<body>

<div class="scene">
    <img id="vex" src="assets/image_2.png" alt="Vex">

    <a class="nav nav-cave" href="#">The Cave</a>
    <a class="nav nav-stash" href="#">The Stash</a>
    <a class="nav nav-lore" href="#">The Lore</a>
    <a class="nav nav-gang" href="#">The Gang</a>

    <div class="merch merch-1"><img src="assets/image.png" alt="Merch"></div>
    <div class="merch merch-2"><img src="assets/image.png" alt="Merch"></div>
    <div class="merch merch-3"><img src="assets/image.png" alt="Merch"></div>
    <div class="merch merch-4"><img src="assets/image.png" alt="Merch"></div>
</div>

</body>
</html>
