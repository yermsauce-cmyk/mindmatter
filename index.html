<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Matter</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wrapper {
            position: relative;
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background-image: url('assets/true_background.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.9) inset;
        }

        #vex-layer {
            position: absolute;
            width: 45%;
            z-index: 10;
            pointer-events: none;
            transform: translate(-50%, -50%);
            will-change: transform;
            left: 28%;
            top: 50%;
        }

        #vex-image {
            width: 100%;
            height: auto;
            pointer-events: auto;
            cursor: pointer;
            filter: drop-shadow(0 0 15px rgba(162, 0, 255, 0.4));
            animation: levitate 4s ease-in-out infinite alternate;
            transition: filter 0.2s ease, transform 0.1s ease;
        }

        @keyframes levitate {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
            100% { transform: translateY(5px) rotate(-1deg); }
        }

        .hitbox {
            position: absolute;
            cursor: pointer;
            background: rgba(255, 0, 0, 0.0);
            transition: background 0.3s ease;
        }

        .hitbox:hover {
            background: rgba(255, 0, 60, 0.08);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.2);
        }

        .link-cave  { top: 24%; left: 60%; width: 20%; height: 12%; }
        .link-stash { top: 39%; left: 60%; width: 20%; height: 12%; }
        .link-lore  { top: 54%; left: 60%; width: 20%; height: 12%; }
        .link-gang  { top: 69%; left: 60%; width: 20%; height: 12%; }

        .merch-feed-zone {
            position: absolute;
            right: 0;
            top: 0;
            width: 11.5%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding-top: 7%;
            gap: 3.5%;
            align-items: center;
        }

        .merch-box {
            width: 83%;
            height: 18.5%;
            background: rgba(162, 0, 255, 0.0);
            cursor: pointer;
            transition: background 0.3s;
        }
        .merch-box:hover {
            background: rgba(162, 0, 255, 0.15);
            outline: 1px solid #a200ff;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <div id="vex-layer">
            <img id="vex-image" src="assets/image_2.png" alt="Vex">
        </div>

        <a href="#gallery" class="hitbox link-cave" title="The Cave Gallery"></a>
        <a href="#shop" class="hitbox link-stash" title="The Stash Shop"></a>
        <a href="#about" class="hitbox link-lore" title="The Lore About"></a>
        <a href="#socials" class="hitbox link-gang" title="The Gang Socials"></a>

        <div class="merch-feed-zone">
            <div class="merch-box" onclick="location.href='#tshirts'" title="Rat T-Shirts"></div>
            <div class="merch-box" onclick="location.href='#patches'" title="Gothic Patches"></div>
            <div class="merch-box" onclick="location.href='#bats'" title="Punk Bat Prints"></div>
            <div class="merch-box" onclick="location.href='#secret'" title="Mystery Item"></div>
        </div>

    </div>

    <script>
        const vexLayer = document.getElementById('vex-layer');
        const vexImage = document.getElementById('vex-image');
        
        let mouseX = window.innerWidth / 4;
        let mouseY = window.innerHeight / 2;
        let currentX = window.innerWidth / 4;
        let currentY = window.innerHeight / 2;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function fluidTracking() {
            currentX += (mouseX - currentX) * 0.04;
            currentY += (mouseY - currentY) * 0.04;

            vexLayer.style.left = `${currentX}px`;
            vexLayer.style.top = `${currentY}px`;

            requestAnimationFrame(fluidTracking);
        }
        fluidTracking();

        // --- VEX CLICK LEVEL SYSTEM ---
        let vexLevel = parseInt(localStorage.getItem('vexLevel')) || 1;
        let vexClickCount = parseInt(localStorage.getItem('vexClicks')) || 0;
        const clicksPerLevel = 10;

        // Level display positioned on skull cutout area
        const levelDisplay = document.createElement('div');
        levelDisplay.style.cssText = 'position:absolute;top:18%;left:8%;z-index:50;pointer-events:none;text-align:center;';
        levelDisplay.innerHTML = `
            <div style="color:#ff00ff;font-size:2.2rem;font-weight:bold;text-shadow:0 0 15px #ff00ff,0 0 30px #ff0088,0 0 45px #ff0044;font-family:'Permanent Marker',cursive;letter-spacing:2px;">
                LEVEL <span id="level-num" style="font-size:3rem;color:#fff;">${vexLevel}</span>
            </div>
            <div style="color:#ff88cc;font-size:0.9rem;margin-top:4px;text-shadow:0 0 8px #ff0088;">
                <span id="click-count">${vexClickCount}</span> / ${clicksPerLevel} CLICKS
            </div>
        `;
        document.body.appendChild(levelDisplay);

        // Progress bar below level
        const progressBar = document.createElement('div');
        progressBar.style.cssText = 'position:absolute;top:26%;left:8%;width:120px;height:6px;background:rgba(0,0,0,0.5);border:1px solid #ff0044;border-radius:3px;z-index:50;pointer-events:none;overflow:hidden;';
        const progressFill = document.createElement('div');
        progressFill.style.cssText = `height:100%;width:${(vexClickCount/clicksPerLevel)*100}%;background:linear-gradient(90deg,#ff0044,#ff00ff);transition:width 0.3s ease;`;
        progressBar.appendChild(progressFill);
        document.body.appendChild(progressBar);

        function showLevelUp() {
            const lvlUp = document.createElement('div');
            lvlUp.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff00ff;font-size:4rem;font-weight:bold;z-index:10000;text-shadow:0 0 30px #ff00ff,0 0 60px #ff0088,0 0 90px #ff0044;pointer-events:none;animation:lvlUpAnim 1.5s ease-out forwards;';
            lvlUp.textContent = `LEVEL ${vexLevel}!`;
            document.body.appendChild(lvlUp);
            const style = document.createElement('style');
            style.textContent = '@keyframes lvlUpAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}20%{opacity:1;transform:translate(-50%,-50%) scale(1.2);}80%{opacity:1;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-60%) scale(0.8);}}';
            document.head.appendChild(style);
            setTimeout(() => lvlUp.remove(), 1500);
        }

        vexImage.addEventListener('click', (e) => {
            e.stopPropagation();
            vexImage.style.filter = 'drop-shadow(0 0 35px #a200ff) hue-rotate(45deg) brightness(1.3)';
            vexImage.style.transform = 'scale(1.1) rotate(-8deg)';
            setTimeout(() => { vexImage.style.filter = 'drop-shadow(0 0 15px rgba(162,0,255,0.4))'; vexImage.style.transform = 'scale(1) rotate(0deg)'; }, 250);

            vexClickCount++;
            document.getElementById('click-count').textContent = vexClickCount;
            progressFill.style.width = `${(vexClickCount/clicksPerLevel)*100}%`;

            if (vexClickCount >= clicksPerLevel) {
                vexLevel++;
                vexClickCount = 0;
                document.getElementById('level-num').textContent = vexLevel;
                document.getElementById('click-count').textContent = vexClickCount;
                progressFill.style.width = '0%';
                localStorage.setItem('vexLevel', vexLevel);
                localStorage.setItem('vexClicks', vexClickCount);
                showLevelUp();
                const baseSize = 42;
                const newSize = Math.min(baseSize + (vexLevel - 1) * 3, 70);
                document.getElementById('vex-layer').style.width = `${newSize}%`;
            } else {
                localStorage.setItem('vexClicks', vexClickCount);
            }
        });
    </script>
</body>
</html>
